<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Powertrack Dashboard - Simple Test</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            background: #1a1a1a;
            color: #fff;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            color: #f97316;
        }

        .kpis {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }

        .kpi-card {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #f97316;
        }

        .kpi-value {
            font-size: 32px;
            font-weight: bold;
            color: #f97316;
        }

        .kpi-label {
            font-size: 14px;
            color: #999;
            margin-top: 5px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #2a2a2a;
            margin-top: 20px;
        }

        th,
        td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #444;
        }

        th {
            background: #333;
            color: #f97316;
            font-weight: 600;
        }

        tr:hover {
            background: #333;
        }

        .status {
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            font-weight: 600;
        }

        .success {
            background: #10b981;
        }

        .error {
            background: #ef4444;
        }

        .loading {
            background: #f59e0b;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🔧 Powertrack Dashboard - Simple Version</h1>

        <div id="status" class="status loading">⏳ Loading data from API...</div>

        <div id="kpis" class="kpis"></div>

        <h2>Recent Breakdowns</h2>
        <table id="breakdown-table">
            <thead>
                <tr>
                    <th>Truck</th>
                    <th>Client</th>
                    <th>Location</th>
                    <th>Severity</th>
                    <th>Date</th>
                    <th>Days</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="breakdown-tbody">
                <tr>
                    <td colspan="7" style="text-align: center; padding: 40px;">Loading...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        const API_URL = "https://powertrack.powerstar.co.zw/api/method/ptz_powertrack.omnis_dashboard.pt_dashboard.get_pt_overview";

        async function loadDashboard() {
            const statusDiv = document.getElementById('status');
            const kpisDiv = document.getElementById('kpis');
            const tbody = document.getElementById('breakdown-tbody');

            try {
                console.log('Fetching data from:', API_URL);

                const response = await fetch(API_URL, {
                    method: 'GET',
                    credentials: 'include',
                    headers: {
                        'Accept': 'application/json'
                    }
                });

                console.log('Response status:', response.status);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                console.log('API Response:', data);

                if (!data.message) {
                    throw new Error('No message in API response');
                }

                const { kpis, recent_breakdowns } = data.message;

                // Display KPIs
                kpisDiv.innerHTML = `
                    <div class="kpi-card">
                        <div class="kpi-value">${kpis.active_trucks || 0}</div>
                        <div class="kpi-label">Active Trucks</div>
                    </div>
                    <div class="kpi-card">
                        <div class="kpi-value">${kpis.open_breakdowns || 0}</div>
                        <div class="kpi-label">Open Breakdowns</div>
                    </div>
                    <div class="kpi-card">
                        <div class="kpi-value">${kpis.high_severity_breakdowns || 0}</div>
                        <div class="kpi-label">High Severity</div>
                    </div>
                    <div class="kpi-card">
                        <div class="kpi-value">${Math.round(kpis.avg_days_on_bd || 0)}</div>
                        <div class="kpi-label">Avg Days on BD</div>
                    </div>
                `;

                // Display breakdowns
                if (recent_breakdowns && recent_breakdowns.length > 0) {
                    tbody.innerHTML = recent_breakdowns.map(bd => `
                        <tr>
                            <td>${bd.truck || bd.lbz}</td>
                            <td>${bd.client}</td>
                            <td>${bd.location}</td>
                            <td>${bd.severity}</td>
                            <td>${bd.breakdown_date || bd.date}</td>
                            <td>${bd.days_on_bd}</td>
                            <td>${bd.status}</td>
                        </tr>
                    `).join('');

                    statusDiv.innerHTML = `✅ Loaded ${recent_breakdowns.length} breakdowns successfully!`;
                    statusDiv.className = 'status success';
                } else {
                    tbody.innerHTML = '<tr><td colspan="7" style="text-align: center;">No breakdowns found</td></tr>';
                    statusDiv.innerHTML = '⚠️ No breakdown data available';
                    statusDiv.className = 'status error';
                }

            } catch (error) {
                console.error('Error loading dashboard:', error);
                statusDiv.innerHTML = `❌ Error: ${error.message}`;
                statusDiv.className = 'status error';
                tbody.innerHTML = `<tr><td colspan="7" style="text-align: center; color: #ef4444;">Failed to load data</td></tr>`;
            }
        }

        // Load on page load
        window.onload = loadDashboard;
    </script>
</body>

</html>
